<!DOCTYPE html>
<html lang="en">
<head>
  <title>Particles</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
      pointer-events: none;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 2px 20px rgba(0,0,0,0.8); }
      50%       { text-shadow: 0 0 60px rgba(255,255,255,0.9), 0 2px 20px rgba(0,0,0,0.8); }
    }

    #content h1 {
      font-size: clamp(2rem, 6vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: #fff;
      text-shadow: 0 0 40px rgba(255,255,255,0.6), 0 2px 20px rgba(0,0,0,0.8);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards, glow 4s ease-in-out 1s infinite;
    }

    #content p {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 1px 12px rgba(0,0,0,0.9);
      max-width: 560px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.4s forwards;
    }

    #content .btn {
      pointer-events: all;
      display: inline-block;
      padding: 0.85rem 2.2rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 100px;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.04em;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    #content .btn:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.45);
    }
  </style>
</head>
<body>

  <div id="canvas-container"></div>

  <script type="x-shader/x-vertex" id="vertexshader">
    attribute float size;
    varying vec3 vColor;

    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (300.0 / -mvPosition.z);
      gl_Position = projectionMatrix * mvPosition;
    }
  </script>

  <script type="x-shader/x-fragment" id="fragmentshader">
    uniform sampler2D pointTexture;
    varying vec3 vColor;

    void main() {
      gl_FragColor = vec4(vColor, 1.0);
      gl_FragColor = gl_FragColor * texture2D(pointTexture, gl_PointCoord);
    }
  </script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    let renderer, scene, camera;
    let particleSystem, uniforms, geometry;

    const particles = 150000;

    // --- Orbit state ---
    let orbitRadius = 300;
    let orbitTheta = 0;
    let orbitPhi = Math.PI / 2;
    const orbitTarget = new THREE.Vector3();
    let dragButton = -1;
    let isDragging = false;
    let lastMouseX = 0, lastMouseY = 0;
    let mouseMoved = false;

    // --- Explode state ---
    let explodeProgress = 0;
    let explodeTarget = 0;

    // --- Formation / morph state ---
    const formationData = {};  // keyed by name, each is Float32Array(particles * 3)
    let morphFrom = new Float32Array(particles * 3);
    let morphTo   = new Float32Array(particles * 3);
    let morphT = 1.0;
    const MORPH_SPEED = 0.025;

    // --- Turbulence state ---
    let turbPhase; // random phase offset per particle per axis

    // ---- Formation builders ----

    function buildCloud(radius) {
      const out = new Float32Array(particles * 3);
      for (let i = 0; i < particles; i++) {
        out[i*3]   = (Math.random() * 2 - 1) * radius;
        out[i*3+1] = (Math.random() * 2 - 1) * radius;
        out[i*3+2] = (Math.random() * 2 - 1) * radius;
      }
      return out;
    }

    function buildSphere(radius) {
      const out = new Float32Array(particles * 3);
      for (let i = 0; i < particles; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(2 * Math.random() - 1);
        out[i*3]   = radius * Math.sin(phi) * Math.cos(theta);
        out[i*3+1] = radius * Math.cos(phi);
        out[i*3+2] = radius * Math.sin(phi) * Math.sin(theta);
      }
      return out;
    }

    function buildTorus() {
      const out = new Float32Array(particles * 3);
      const R = 150, r = 55;
      for (let i = 0; i < particles; i++) {
        const u = Math.random() * Math.PI * 2;
        const v = Math.random() * Math.PI * 2;
        out[i*3]   = (R + r * Math.cos(u)) * Math.cos(v);
        out[i*3+1] = r * Math.sin(u);
        out[i*3+2] = (R + r * Math.cos(u)) * Math.sin(v);
      }
      return out;
    }

    function buildHelix() {
      const out = new Float32Array(particles * 3);
      const helixR = 60, helixH = 300, turns = 10;
      for (let i = 0; i < particles; i++) {
        const strand = i % 2;
        const t = (Math.floor(i / 2) / (particles / 2)) * turns * Math.PI * 2;
        const offset = strand * Math.PI;
        out[i*3]   = helixR * Math.cos(t + offset);
        out[i*3+1] = (t / (turns * Math.PI * 2)) * helixH - helixH / 2;
        out[i*3+2] = helixR * Math.sin(t + offset);
      }
      return out;
    }

    function morphTo_formation(name) {
      // Snapshot current interpolated positions as the new morphFrom
      const posArr = geometry.attributes.position.array;
      for (let i = 0; i < particles * 3; i++) {
        // Reverse-remove explode scale so morphFrom is in base space
        const scale = 1 + explodeProgress * 4;
        morphFrom[i] = posArr[i] / scale;
      }
      morphTo = formationData[name];
      morphT = 0;

      // Reset camera to default view
      orbitRadius = 300;
      orbitTarget.set(0, 0, 0);
    }

    // ---- Spark texture ----

    function makeSparkTexture() {
      const size = 64;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      gradient.addColorStop(0,   'rgba(255,255,255,1)');
      gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
      gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
      gradient.addColorStop(1,   'rgba(255,255,255,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(canvas);
    }

    // ---- Init ----

    function init() {
      camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);

      scene = new THREE.Scene();

      uniforms = { pointTexture: { value: makeSparkTexture() } };

      const shaderMaterial = new THREE.ShaderMaterial({
        uniforms,
        vertexShader:   document.getElementById('vertexshader').textContent,
        fragmentShader: document.getElementById('fragmentshader').textContent,
        blending:    THREE.AdditiveBlending,
        depthTest:   false,
        transparent: true,
        vertexColors: true
      });

      // Build all formations
      formationData.cloud  = buildCloud(200);
      formationData.sphere = buildSphere(180);
      formationData.torus  = buildTorus();
      formationData.helix  = buildHelix();

      // Start in cloud formation
      morphFrom.set(formationData.cloud);
      morphTo = formationData.cloud;

      // Turbulence: random phase per particle per axis
      turbPhase = new Float32Array(particles * 3);
      for (let i = 0; i < particles * 3; i++) {
        turbPhase[i] = Math.random() * Math.PI * 2;
      }

      geometry = new THREE.BufferGeometry();

      const colors = new Float32Array(particles * 3);
      const sizes  = new Float32Array(particles);
      const color  = new THREE.Color();
      for (let i = 0; i < particles; i++) {
        color.setHSL(i / particles, 1.0, 0.5);
        colors[i*3]   = color.r;
        colors[i*3+1] = color.g;
        colors[i*3+2] = color.b;
        sizes[i] = 20;
      }

      geometry.setAttribute('position', new THREE.Float32BufferAttribute(formationData.cloud.slice(), 3).setUsage(THREE.DynamicDrawUsage));
      geometry.setAttribute('color',    new THREE.Float32BufferAttribute(colors, 3));
      geometry.setAttribute('size',     new THREE.Float32BufferAttribute(sizes,  1).setUsage(THREE.DynamicDrawUsage));

      particleSystem = new THREE.Points(geometry, shaderMaterial);
      scene.add(particleSystem);

      renderer = new THREE.WebGLRenderer({ antialias: false });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setAnimationLoop(animate);

      document.getElementById('canvas-container').appendChild(renderer.domElement);

      window.addEventListener('resize', onWindowResize);

      // Left-drag = orbit, right-drag = pan
      window.addEventListener('contextmenu', (e) => e.preventDefault());

      window.addEventListener('mousedown', (e) => {
        isDragging  = true;
        dragButton  = e.button;
        mouseMoved  = false;
        lastMouseX  = e.clientX;
        lastMouseY  = e.clientY;
      });

      window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - lastMouseX;
        const dy = e.clientY - lastMouseY;
        if (Math.abs(dx) > 2 || Math.abs(dy) > 2) mouseMoved = true;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;

        if (dragButton === 0) {
          orbitTheta -= dx * 0.005;
          orbitPhi    = Math.max(0.15, Math.min(Math.PI - 0.15, orbitPhi - dy * 0.005));
        } else if (dragButton === 2) {
          const panSpeed = orbitRadius * 0.001;
          const right = new THREE.Vector3();
          const up    = new THREE.Vector3();
          right.setFromMatrixColumn(camera.matrix, 0);
          up.setFromMatrixColumn(camera.matrix, 1);
          orbitTarget.addScaledVector(right, -dx * panSpeed);
          orbitTarget.addScaledVector(up,    -dy * panSpeed);
        }
      });

      window.addEventListener('mouseup', () => {
        isDragging = false;
        dragButton = -1;
      });

      window.addEventListener('wheel', (e) => {
        orbitRadius = Math.max(80, Math.min(900, orbitRadius + e.deltaY * 0.4));
      }, { passive: true });

      // Keyboard: 1-4 = formations, Space = explode/implode
      window.addEventListener('keydown', (e) => {
        const map = { '1': 'cloud', '2': 'sphere', '3': 'torus', '4': 'helix' };
        if (map[e.key]) morphTo_formation(map[e.key]);
        if (e.code === 'Space') {
          e.preventDefault();
          explodeTarget = explodeTarget === 0 ? 1 : 0;
          if (explodeTarget === 0) {
            orbitRadius = 300;
            orbitTarget.set(0, 0, 0);
          }
        }
      });
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      const time     = Date.now() * 0.005;
      const turbTime = Date.now() * 0.0008; // slower, for gentle drift

      // Camera
      camera.position.set(
        orbitTarget.x + orbitRadius * Math.sin(orbitPhi) * Math.sin(orbitTheta),
        orbitTarget.y + orbitRadius * Math.cos(orbitPhi),
        orbitTarget.z + orbitRadius * Math.sin(orbitPhi) * Math.cos(orbitTheta)
      );
      camera.lookAt(orbitTarget);

      // Advance morph
      if (morphT < 1.0) morphT = Math.min(1.0, morphT + MORPH_SPEED);

      // Advance explode
      explodeProgress += (explodeTarget - explodeProgress) * 0.06;
      const explodeScale = 1 + explodeProgress * 4;

      const posArr  = geometry.attributes.position.array;
      const sizeArr = geometry.attributes.size.array;

      const TURB_AMP = 14;

      for (let i = 0; i < particles; i++) {
        const i3 = i * 3;

        // Smooth-step morph for a more organic feel
        const t  = morphT * morphT * (3 - 2 * morphT);
        const bx = morphFrom[i3]   + (morphTo[i3]   - morphFrom[i3])   * t;
        const by = morphFrom[i3+1] + (morphTo[i3+1] - morphFrom[i3+1]) * t;
        const bz = morphFrom[i3+2] + (morphTo[i3+2] - morphFrom[i3+2]) * t;

        // Turbulence: each particle has its own phase per axis
        const tx = Math.sin(turbPhase[i3]   + turbTime * 0.9) * TURB_AMP;
        const ty = Math.sin(turbPhase[i3+1] + turbTime * 0.7) * TURB_AMP;
        const tz = Math.sin(turbPhase[i3+2] + turbTime * 0.8) * TURB_AMP;

        posArr[i3]   = (bx + tx) * explodeScale;
        posArr[i3+1] = (by + ty) * explodeScale;
        posArr[i3+2] = (bz + tz) * explodeScale;

        sizeArr[i] = 10 * (1 + Math.sin(0.1 * i + time));
      }

      geometry.attributes.position.needsUpdate = true;
      geometry.attributes.size.needsUpdate = true;

      renderer.render(scene, camera);
    }

    init();
  </script>

</body>
</html>
