<!DOCTYPE html>
<html lang="en">
<head>
  <title>Particles</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
      pointer-events: none;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 2px 20px rgba(0,0,0,0.8); }
      50%       { text-shadow: 0 0 60px rgba(255,255,255,0.9), 0 2px 20px rgba(0,0,0,0.8); }
    }

    #content h1 {
      font-size: clamp(2rem, 6vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: #fff;
      text-shadow: 0 0 40px rgba(255,255,255,0.6), 0 2px 20px rgba(0,0,0,0.8);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards, glow 4s ease-in-out 1s infinite;
    }

    #content p {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 1px 12px rgba(0,0,0,0.9);
      max-width: 560px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.4s forwards;
    }

    #content .btn {
      pointer-events: all;
      display: inline-block;
      padding: 0.85rem 2.2rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 100px;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.04em;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    #content .btn:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.45);
    }
  </style>
</head>
<body>

  <div id="canvas-container"></div>

  <script type="x-shader/x-vertex" id="vertexshader">
    attribute float size;
    varying vec3 vColor;

    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (300.0 / -mvPosition.z);
      gl_Position = projectionMatrix * mvPosition;
    }
  </script>

  <script type="x-shader/x-fragment" id="fragmentshader">
    uniform sampler2D pointTexture;
    varying vec3 vColor;

    void main() {
      gl_FragColor = vec4(vColor, 1.0);
      gl_FragColor = gl_FragColor * texture2D(pointTexture, gl_PointCoord);
    }
  </script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    let renderer, scene, camera;
    let particleSystem, uniforms, geometry;

    const particles = 150000;

    function makeSparkTexture() {
      const size = 64;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
      gradient.addColorStop(0, 'rgba(255,255,255,1)');
      gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
      gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
      gradient.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(canvas);
    }

    function init() {
      camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);
      camera.position.z = 300;

      scene = new THREE.Scene();

      uniforms = {
        pointTexture: { value: makeSparkTexture() }
      };

      const shaderMaterial = new THREE.ShaderMaterial({
        uniforms,
        vertexShader: document.getElementById('vertexshader').textContent,
        fragmentShader: document.getElementById('fragmentshader').textContent,
        blending: THREE.AdditiveBlending,
        depthTest: false,
        transparent: true,
        vertexColors: true
      });

      const radius = 200;
      geometry = new THREE.BufferGeometry();

      const positions = [];
      const colors = [];
      const sizes = [];
      const color = new THREE.Color();

      for (let i = 0; i < particles; i++) {
        positions.push((Math.random() * 2 - 1) * radius);
        positions.push((Math.random() * 2 - 1) * radius);
        positions.push((Math.random() * 2 - 1) * radius);

        color.setHSL(i / particles, 1.0, 0.5);
        colors.push(color.r, color.g, color.b);

        sizes.push(20);
      }

      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1).setUsage(THREE.DynamicDrawUsage));

      particleSystem = new THREE.Points(geometry, shaderMaterial);
      scene.add(particleSystem);

      renderer = new THREE.WebGLRenderer({ antialias: false });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setAnimationLoop(animate);

      document.getElementById('canvas-container').appendChild(renderer.domElement);

      window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      const time = Date.now() * 0.005;
      particleSystem.rotation.z = 0.01 * time;

      const sizes = geometry.attributes.size.array;
      for (let i = 0; i < particles; i++) {
        sizes[i] = 10 * (1 + Math.sin(0.1 * i + time));
      }
      geometry.attributes.size.needsUpdate = true;

      renderer.render(scene, camera);
    }

    init();
  </script>

</body>
</html>
