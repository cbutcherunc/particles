<!DOCTYPE html>
<html lang="en">
<head>
  <title>Luminos</title>
  <link rel="icon" type="image/png" href="luminos_favicon_512.png">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="canvas-container"></div>

  <div id="controls">
    <div class="controls-row"><kbd>1</kbd><span>Cube</span></div>
    <div class="controls-row"><kbd>2</kbd><span>Sphere</span></div>
    <div class="controls-row"><kbd>3</kbd><span>Torus</span></div>
    <div class="controls-row"><kbd>4</kbd><span>Helix</span></div>
    <div class="controls-row"><kbd>5</kbd><span>Galaxy</span></div>
    <div class="controls-divider"></div>
    <div class="controls-row"><kbd>Space</kbd><span>Explode</span></div>
    <div class="controls-divider"></div>
    <div class="controls-row"><kbd>drag</kbd><span>Orbit</span></div>
    <div class="controls-row"><kbd>scroll</kbd><span>Zoom</span></div>
  </div>

  <script type="x-shader/x-vertex" id="vertexshader">
    attribute float size;
    varying vec3 vColor;

    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (300.0 / -mvPosition.z);
      gl_Position = projectionMatrix * mvPosition;
    }
  </script>

  <script type="x-shader/x-fragment" id="fragmentshader">
    uniform sampler2D pointTexture;
    varying vec3 vColor;

    void main() {
      gl_FragColor = vec4(vColor, 1.0);
      gl_FragColor = gl_FragColor * texture2D(pointTexture, gl_PointCoord);
    }
  </script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    let renderer, scene, camera;
    let particleSystem, uniforms, geometry;

    const particles = 150000;

    // Per-formation default camera positions
    const formationCameras = {
      cube:   { radius: 1050, theta: Math.PI / 4, phi: Math.PI / 2 - Math.atan(1 / Math.SQRT2), targetY: 0 },
      sphere:  { radius: 600,  theta: 0.4,          phi: Math.PI / 2 - 0.2,                       targetY: 0 },
      torus:   { radius: 700,  theta: 0.4,          phi: Math.PI / 2 - 0.7,                       targetY: 0 },
      helix:   { radius: 560,  theta: 0.5,          phi: Math.PI / 2 - 0.15,                      targetY: 0 },
      galaxy:  { radius: 600,  theta: 0.4,          phi: Math.PI / 2 - 0.85,                      targetY: 0 },
    };

    // --- Orbit state ---
    let orbitRadius = formationCameras.cube.radius;
    let orbitTheta = formationCameras.cube.theta;
    let orbitPhi = formationCameras.cube.phi;
    const orbitTarget = new THREE.Vector3();
    let isDragging = false;
    let lastMouseX = 0, lastMouseY = 0;
    let mouseMoved = false;

    // --- Explode state ---
    let explodeProgress = 0;
    let explodeTarget = 0;

    // --- Formation / morph state ---
    const formationData = {};  // keyed by name, each is Float32Array(particles * 3)
    let morphFrom = new Float32Array(particles * 3);
    let morphTo = new Float32Array(particles * 3);
    let morphT = 1.0;
    const MORPH_SPEED = 0.025;

    // --- Turbulence state ---
    let turbPhase; // random phase offset per particle per axis

    // ---- Formation builders ----

    function buildCube(radius) {
      const out = new Float32Array(particles * 3);
      for (let i = 0; i < particles; i++) {
        out[i*3] = (Math.random() * 2 - 1) * radius;
        out[i*3+1] = (Math.random() * 2 - 1) * radius;
        out[i*3+2] = (Math.random() * 2 - 1) * radius;
      }
      return out;
    }

    function buildSphere(radius) {
      const out = new Float32Array(particles * 3);
      for (let i = 0; i < particles; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        out[i*3] = radius * Math.sin(phi) * Math.cos(theta);
        out[i*3+1] = radius * Math.cos(phi);
        out[i*3+2] = radius * Math.sin(phi) * Math.sin(theta);
      }
      return out;
    }

    function buildTorus() {
      const out = new Float32Array(particles * 3);
      const R = 150, r = 55;
      for (let i = 0; i < particles; i++) {
        const u = Math.random() * Math.PI * 2;
        const v = Math.random() * Math.PI * 2;
        out[i*3] = (R + r * Math.cos(u)) * Math.cos(v);
        out[i*3+1] = r * Math.sin(u);
        out[i*3+2] = (R + r * Math.cos(u)) * Math.sin(v);
      }
      return out;
    }

    function buildHelix() {
      const out = new Float32Array(particles * 3);
      const helixR = 60, helixH = 300, turns = 10;
      for (let i = 0; i < particles; i++) {
        const strand = i % 2;
        const t = (Math.floor(i / 2) / (particles / 2)) * turns * Math.PI * 2;
        const offset = strand * Math.PI;
        out[i*3] = helixR * Math.cos(t + offset);
        out[i*3+1] = (t / (turns * Math.PI * 2)) * helixH - helixH / 2;
        out[i*3+2] = helixR * Math.sin(t + offset);
      }
      return out;
    }

    function buildGalaxy() {
      const out = new Float32Array(particles * 3);
      const arms = 3, spread = 180, height = 18, coreRadius = 30;
      for (let i = 0; i < particles; i++) {
        // Distance from centre — concentrate particles toward the core
        const r = coreRadius + Math.pow(Math.random(), 0.6) * (spread - coreRadius);
        const armAngle = (i % arms) * (Math.PI * 2 / arms);
        // Spiral: angle increases with radius
        const spin = (r / spread) * Math.PI * 3;
        const scatter = (1 - r / spread) * 0.6 + 0.1;
        const angle = armAngle + spin + (Math.random() - 0.5) * scatter * 2;
        out[i*3]   = r * Math.cos(angle);
        out[i*3+1] = (Math.random() - 0.5) * height * (1 - r / spread * 0.8);
        out[i*3+2] = r * Math.sin(angle);
      }
      return out;
    }

    function morphTo_formation(name) {
      // Snapshot current interpolated positions as the new morphFrom
      const posArr = geometry.attributes.position.array;
      for (let i = 0; i < particles * 3; i++) {
        // Reverse-remove explode scale so morphFrom is in base space
        const scale = 1 + explodeProgress * 4;
        morphFrom[i] = posArr[i] / scale;
      }
      morphTo = formationData[name];
      morphT = 0;

      // Reset camera to this formation's default view
      const cam = formationCameras[name];
      orbitRadius = cam.radius;
      orbitTheta = cam.theta;
      orbitPhi = cam.phi;
      orbitTarget.set(0, cam.targetY, 0);
    }

    // ---- Spark texture ----

    function makeSparkTexture() {
      const size = 64;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      gradient.addColorStop(0,   'rgba(255,255,255,1)');
      gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
      gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
      gradient.addColorStop(1,   'rgba(255,255,255,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(canvas);
    }

    // ---- Init ----

    function init() {
      camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);

      scene = new THREE.Scene();

      uniforms = { pointTexture: { value: makeSparkTexture() } };

      const shaderMaterial = new THREE.ShaderMaterial({
        uniforms,
        vertexShader:   document.getElementById('vertexshader').textContent,
        fragmentShader: document.getElementById('fragmentshader').textContent,
        blending:    THREE.AdditiveBlending,
        depthTest:   false,
        transparent: true,
        vertexColors: true
      });

      // Build all formations
      formationData.cube   = buildCube(200);
      formationData.sphere  = buildSphere(180);
      formationData.torus   = buildTorus();
      formationData.helix   = buildHelix();
      formationData.galaxy  = buildGalaxy();

      // Start in cube formation
      morphFrom.set(formationData.cube);
      morphTo = formationData.cube;

      // Turbulence: random phase per particle per axis
      turbPhase = new Float32Array(particles * 3);
      for (let i = 0; i < particles * 3; i++) {
        turbPhase[i] = Math.random() * Math.PI * 2;
      }

      geometry = new THREE.BufferGeometry();

      const colors = new Float32Array(particles * 3);
      const sizes  = new Float32Array(particles);
      const color  = new THREE.Color();
      for (let i = 0; i < particles; i++) {
        color.setHSL(i / particles, 1.0, 0.5);
        colors[i*3]   = color.r;
        colors[i*3+1] = color.g;
        colors[i*3+2] = color.b;
        sizes[i] = 20;
      }

      geometry.setAttribute('position', new THREE.Float32BufferAttribute(formationData.cube.slice(), 3).setUsage(THREE.DynamicDrawUsage));
      geometry.setAttribute('color',    new THREE.Float32BufferAttribute(colors, 3));
      geometry.setAttribute('size',     new THREE.Float32BufferAttribute(sizes,  1).setUsage(THREE.DynamicDrawUsage));

      particleSystem = new THREE.Points(geometry, shaderMaterial);
      scene.add(particleSystem);

      renderer = new THREE.WebGLRenderer({ antialias: false });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setAnimationLoop(animate);

      document.getElementById('canvas-container').appendChild(renderer.domElement);

      window.addEventListener('resize', onWindowResize);

      window.addEventListener('mousedown', (e) => {
        isDragging = true;
        mouseMoved = false;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
      });

      window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - lastMouseX;
        const dy = e.clientY - lastMouseY;
        if (Math.abs(dx) > 2 || Math.abs(dy) > 2) mouseMoved = true;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
        orbitTheta -= dx * 0.005;
        orbitPhi    = Math.max(0.15, Math.min(Math.PI - 0.15, orbitPhi - dy * 0.005));
      });

      window.addEventListener('mouseup', () => {
        isDragging = false;
      });

      window.addEventListener('wheel', (e) => {
        orbitRadius = Math.max(80, Math.min(1200, orbitRadius + e.deltaY * 0.4));
      }, { passive: true });

      // Keyboard: 1-4 = formations, Space = explode/implode
      window.addEventListener('keydown', (e) => {
        const map = { '1': 'cube', '2': 'sphere', '3': 'torus', '4': 'helix', '5': 'galaxy' };
        if (map[e.key]) morphTo_formation(map[e.key]);
        if (e.code === 'Space') {
          e.preventDefault();
          explodeTarget = explodeTarget === 0 ? 1 : 0;
          if (explodeTarget === 0) {
            const name = Object.keys(formationCameras)[Object.values(formationData).indexOf(morphTo)];
            const cam  = formationCameras[name] || formationCameras.cube;
            orbitRadius = cam.radius;
            orbitTheta  = cam.theta;
            orbitPhi    = cam.phi;
            orbitTarget.set(0, cam.targetY, 0);
          }
        }
      });
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      const time     = Date.now() * 0.005;
      const turbTime = Date.now() * 0.0008; // slower, for gentle drift

      // Camera
      camera.position.set(
        orbitTarget.x + orbitRadius * Math.sin(orbitPhi) * Math.sin(orbitTheta),
        orbitTarget.y + orbitRadius * Math.cos(orbitPhi),
        orbitTarget.z + orbitRadius * Math.sin(orbitPhi) * Math.cos(orbitTheta)
      );
      camera.lookAt(orbitTarget);

      // Advance morph
      if (morphT < 1.0) morphT = Math.min(1.0, morphT + MORPH_SPEED);

      // Advance explode
      explodeProgress += (explodeTarget - explodeProgress) * 0.06;
      const explodeScale = 1 + explodeProgress * 4;

      const posArr  = geometry.attributes.position.array;
      const sizeArr = geometry.attributes.size.array;

      const TURB_AMP = 14;

      for (let i = 0; i < particles; i++) {
        const i3 = i * 3;

        // Smooth-step morph for a more organic feel
        const t  = morphT * morphT * (3 - 2 * morphT);
        const bx = morphFrom[i3]   + (morphTo[i3]   - morphFrom[i3])   * t;
        const by = morphFrom[i3+1] + (morphTo[i3+1] - morphFrom[i3+1]) * t;
        const bz = morphFrom[i3+2] + (morphTo[i3+2] - morphFrom[i3+2]) * t;

        // Turbulence: each particle has its own phase per axis
        const tx = Math.sin(turbPhase[i3]   + turbTime * 0.9) * TURB_AMP;
        const ty = Math.sin(turbPhase[i3+1] + turbTime * 0.7) * TURB_AMP;
        const tz = Math.sin(turbPhase[i3+2] + turbTime * 0.8) * TURB_AMP;

        posArr[i3]   = (bx + tx) * explodeScale;
        posArr[i3+1] = (by + ty) * explodeScale;
        posArr[i3+2] = (bz + tz) * explodeScale;

        sizeArr[i] = 10 * (1 + Math.sin(0.1 * i + time));
      }

      geometry.attributes.position.needsUpdate = true;
      geometry.attributes.size.needsUpdate = true;

      renderer.render(scene, camera);
    }

    init();
  </script>

</body>
</html>
